<!--
Contract Attributes
Binds Path A to Path B and to the Object Type schema

1. method="POST" action="/submit" — must match Path B's HTTP In exactly.
2. enctype="multipart/form-data" — without this, the file never leaves the browser; you'd receive only the filename string. This single attribute is the difference between satisfying CR-03 and failing it.
3. Field names submitterName, submitterEmail, note — matching the schema field names 1:1 means the Path B reshape (Set msg.payload) stays trivial and traceable.
4. The file input name (document) — whatever you choose here is the name you'll look for when you run the [VERIFY] inspection on Path B's message shape. Pick it now, keep it stable.

-->

<!DOCTYPE html>
<html>
<head><title>DropDocx Intake</title></head>
<body>
  <h1>DropDocx — Submit a Request</h1>
  <form method="POST" action="/submit" enctype="multipart/form-data">
    <label>Name
      <input type="text" name="submitterName" required>
    </label><br>
    <label>Email
      <input type="email" name="submitterEmail" required>
    </label><br>
    <label>Note
      <textarea name="note" required></textarea>
    </label><br>
    <label>Document
      <input type="file" name="document" required>
    </label><br>
    <button type="submit">Submit</button>
  </form>
</body>
</html>
